<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Meatbags games, playable in the browser."
    />
    <meta property="og:title" content="Meatbags" />
    <meta
      property="og:description"
      content="Small games, playable in the browser."
    />
    <meta property="og:image" content="https://wearemeatbags.github.io/assets/logo.png" />
    <meta property="og:type" content="website" />
    <title>Meatbags</title>
    <link rel="icon" href="/assets/logo.png" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/site.js" defer></script>
  </head>
  <body>
    <header class="site-header" aria-label="Meatbags">
      <a class="brand-link" href="/" aria-label="Meatbags home">
        <img class="brand-logo" src="/assets/logo.png" alt="" />
      </a>
      <a class="github-link" href="https://github.com/wearemeatbags">GitHub</a>
    </header>

    <main class="page-shell">
      <section class="intro" aria-labelledby="page-title">
        <h1 id="page-title">Meatbags</h1>
        <p>Small games, playable in the browser.</p>
      </section>

      <section class="games" aria-label="Games">
        <ol class="game-list" id="game-list" aria-live="polite">
          <li class="game-row game-row-status">Loading games</li>
        </ol>
        <noscript>
          <ol class="game-list">
            <li class="game-row">
              <a class="game-title" href="https://wearemeatbags.github.io/boll/">BOLL</a>
              <p class="game-description">Paddle Juggle</p>
              <nav class="game-actions" aria-label="BOLL links">
                <a href="https://wearemeatbags.github.io/boll/">Play</a>
                <a href="https://github.com/wearemeatbags/boll">Source</a>
              </nav>
            </li>
          </ol>
        </noscript>
      </section>
    </main>

    <footer class="site-footer">
      <span>&copy; Meatbags</span>
      <a href="https://github.com/wearemeatbags">github.com/wearemeatbags</a>
    </footer>
  </body>
</html>
